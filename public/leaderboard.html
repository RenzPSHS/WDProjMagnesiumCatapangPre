<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Snakademic - Leaderboard</title>
        <link rel="icon" type="image/png" href="../assets/Snake_Logo.png">
        <link rel="stylesheet" href="styles.css" />
        <style>
            .main-body-section {
                display: flex;
                justify-content: space-between;
                max-width: 1200px;
                margin-top: 250px; 
                margin-bottom: 50px;
                margin-left: auto;
                margin-right: auto;
                padding: 0 20px;
                gap: 30px;
            }

            .col-settings {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .col-leaderboard {
                flex: 1.5;
                border: 3px solid #2c4c2d; 
                background-color: #f4f9f4; 
                display: flex;
                flex-direction: column;
                max-height: 400px;
                overflow-y: auto;
            }

            .rank-item {
                padding: 12px 15px;
                border-bottom: 2px solid #2c4c2d; 
                font-weight: 500;
                font-size: 1.1rem;
            }
            
            .rank-item:last-child {
                border-bottom: none;
            }

            .col-stats {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .stats-display-box {
                border: 3px solid #2c4c2d; 
                background-color: #f4f9f4; 
                padding: 20px;
                text-align: center;
                min-height: 150px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .btn-box {
                padding: 15px;
                background-color: #f5c952; 
                border: 2px solid #2c4c2d; 
                color: #2c4c2d;
                font-weight: bold;
                font-size: 1rem;
                cursor: pointer;
                text-align: center;
                transition: background 0.2s;
            }
            
            .btn-box:hover {
                background-color: #e5b83b;
            }

            .btn-danger {
                background-color: #d9534f;
                color: #fcfcfc;
                border: 2px solid #2c4c2d;
                cursor: pointer;
                padding: 8px;
                font-weight: bold;
                transition: 0.2s;
            }
            
            .btn-danger:hover {
                background-color: #c9302c;
            }

            @media (max-width: 768px) {
                .main-body-section {
                    flex-direction: column;
                    margin-top: 150px;
                }
                #navbar {
                    grid-template-columns: repeat(2, 1fr); 
                }
                .col-settings {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <header id="topbar">
            <div class="brand">
                <img class="logo" src="../assets/Snake_Logo.png" alt="logo">
                <h1 id="title">Snakademic</h1>
            </div>
            <nav>
                <ul id="navbar">
                    <li><a class="links" href="../index.html">Home</a></li>
                    <li><a class="links" href="guide.html">How To Play</a></li>
                    <li><a class="links" href="game.html">The Game</a></li>
                    <li><a class="links" href="account.html">Account</a></li>
                    <li><a class="links" href="settings.html">Settings</a></li>
                    <li><p id="webpage">Leaderboard</p></li>
                    <li><a class="links" href="leaderboard[MOD].html">Leaderboard[Modified]</a></li>
                    <li><a class="links" href="about.html">About Us</a></li>
                </ul>
            </nav>
        </header>
        <div class="content-wrapper"></div>
        <section class="main-body-section">
            <div class="col-settings"></div>

            <div class="col-leaderboard" id="leaderboard-container"></div>

            <div class="col-stats">
                <div class="stats-display-box" id="personal-stats-box">
                    <h2>Your Stats</h2>
                    <p>Loading stats...</p>
                </div>
                <button id="btn-update-lb" class="btn-box">Update Leaderboard</button>
            </div>
        </section>
        </div>
        <footer>
            <div class="brand_footer">
                <img class="logo_footer" src="../assets/Snake_Logo.png" alt="logo">
                <h1 class="bTitle">Snakademic</h1>
                <p id="copyright">© 2025</p>
            </div>
            <div class="sources">
                <h2>Sources:</h2>
                <p>Kenny Yip Coding. (2022, March 28). How to code snake game in JavaScript [Video]. YouTube.</p>
            </div>
        </footer>

        <script>
            function fetchScores() {
                let allScores = JSON.parse(localStorage.getItem("snakademicScores")) || [];
                let highestScoresPerPlayer = {};

                for (let i = 0; i < allScores.length; i++) {
                    let entry = allScores[i];
                    let name = entry.username;
                    let currentScore = entry.score;

                    if (!highestScoresPerPlayer[name] || currentScore > highestScoresPerPlayer[name]) {
                        highestScoresPerPlayer[name] = currentScore; 
                    }
                }

                let finalLeaderboard = Object.keys(highestScoresPerPlayer).map(function(name) {
                    return { username: name, score: highestScoresPerPlayer[name] };
                });

                return finalLeaderboard;
            }
            
            function loadPersonalStats() {
                let currentUser = localStorage.getItem("currentUser");
                let statsBox = document.getElementById('personal-stats-box');
                
                if (!currentUser) {
                    statsBox.innerHTML = `<h2>Your Stats</h2><p>Please login to see your stats.</p>`;
                    return;
                }

                // FIX: Dynamically calculate user's highest score
                let allScores = JSON.parse(localStorage.getItem("snakademicScores")) || [];
                let userScores = allScores.filter(s => s.username === currentUser);
                
                let hps = 0;
                if (userScores.length > 0) {
                    hps = Math.max(...userScores.map(s => s.score));
                }
                
                statsBox.innerHTML = `
                    <h2>Your Stats</h2>
                    <p>Hello <em>${currentUser}</em>!</p>
                    <p>Your current highest score is: <strong>${hps}</strong></p>
                    <hr style="border: 1px solid #2c4c2d; margin: 15px 0;">
                    <button onclick="resetMyScores()" class="btn-danger" style="font-size: 0.9rem; width: 100%;">Delete Game Score</button>
                `;
            }

            function resetMyScores() {
                if (confirm("Are you sure you want to delete all your saved scores?")) {
                    let user = localStorage.getItem("currentUser");
                    let scores = JSON.parse(localStorage.getItem("snakademicScores")) || [];
                    
                    let updatedScores = scores.filter(s => s.username !== user);
                    localStorage.setItem("snakademicScores", JSON.stringify(updatedScores));
                    
                    // FIX: We no longer reset 'highestScore' global key
                    
                    alert("Your scores have been cleared.");
                    location.reload();
                }
            }
            
            function getOrdinalSuffix(i) {
                let j = i % 10, k = i % 100;
                if (j == 1 && k != 11) { return i + "st"; }
                if (j == 2 && k != 12) { return i + "nd"; }
                if (j == 3 && k != 13) { return i + "rd"; }
                return i + "th";
            }

            function loadLeaderboard(dataArray) {
                const container = document.getElementById("leaderboard-container");
                if (!container) return;
                
                container.innerHTML = ""; 

                if (dataArray.length === 0) {
                    container.innerHTML = "<div style='padding: 30px; text-align: center; font-size: 1.2rem; font-weight: bold; color: #2c4c2d;'>No scores have been saved yet! Play the game to be the first!</div>";
                    return;
                }

                const sortedPlayers = dataArray.sort((a, b) => b.score - a.score);
                const maxPlayersToShow = Math.min(sortedPlayers.length, 20);
                let currentUser = localStorage.getItem("currentUser");

                for (let i = 0; i < maxPlayersToShow; i++) {
                    let player = sortedPlayers[i];
                    let rankText = getOrdinalSuffix(i + 1);

                    let rankDiv = document.createElement("div");
                    rankDiv.className = "rank-item";
                    rankDiv.innerHTML = `<strong>${rankText}</strong> &nbsp;|&nbsp; ${player.username} <span style="float: right;">${player.score}</span>`;
                    
                    if (currentUser && player.username === currentUser) {
                        rankDiv.style.backgroundColor = "#fff9c4"; 
                    }

                    container.appendChild(rankDiv);
                }
            }
            
            window.onload = function() {
                loadLeaderboard(fetchScores());
                loadPersonalStats();

                let btnUpdate = document.getElementById('btn-update-lb');
                if (btnUpdate) {
                    btnUpdate.addEventListener('click', function() {
                        loadLeaderboard(fetchScores());
                        loadPersonalStats(); 
                        
                        let originalText = this.innerText;
                        this.innerText = "Updated!";
                        setTimeout(() => this.innerText = originalText, 1500);
                    });
                }
            };
        </script>
    </body>
</html>
